name: build
on:
  push:
    paths:
      - src/**
      - tests/**
      - ci/**
      - .github/workflows/**
      - pyproject.toml
      - tox.ini
      - pytest.ini
  pull_request:
    paths:
      - src/**
      - tests/**
      - ci/**
      - .github/workflows/**
      - pyproject.toml
      - tox.ini
      - pytest.ini
  workflow_dispatch:
jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 'check'
            python: '3.13'
            tox_env: 'check'
            os: 'ubuntu-latest'
          - name: 'docs'
            python: '3.13'
            tox_env: 'docs'
            os: 'ubuntu-latest'
          - name: 'py39 (ubuntu/x64)'
            python: '3.9'
            python_arch: 'x64'
            tox_env: 'py39'
            os: 'ubuntu-latest'
            cover: true
          - name: 'py39 (windows/x64)'
            python: '3.9'
            python_arch: 'x64'
            tox_env: 'py39'
            os: 'windows-latest'
            cover: true
          - name: 'py39 (macos/arm64)'
            python: '3.9'
            python_arch: 'arm64'
            tox_env: 'py39'
            os: 'macos-latest'
            cover: true
          - name: 'py310 (ubuntu/x64)'
            python: '3.10'
            python_arch: 'x64'
            tox_env: 'py310'
            os: 'ubuntu-latest'
            cover: true
          - name: 'py310 (windows/x64)'
            python: '3.10'
            python_arch: 'x64'
            tox_env: 'py310'
            os: 'windows-latest'
            cover: true
          - name: 'py310 (macos/arm64)'
            python: '3.10'
            python_arch: 'arm64'
            tox_env: 'py310'
            os: 'macos-latest'
            cover: true
          - name: 'py311 (ubuntu/x64)'
            python: '3.11'
            python_arch: 'x64'
            tox_env: 'py311'
            os: 'ubuntu-latest'
            cover: true
          - name: 'py311 (windows/x64)'
            python: '3.11'
            python_arch: 'x64'
            tox_env: 'py311'
            os: 'windows-latest'
            cover: true
          - name: 'py311 (macos/arm64)'
            python: '3.11'
            python_arch: 'arm64'
            tox_env: 'py311'
            os: 'macos-latest'
            cover: true
          - name: 'py312 (ubuntu/x64)'
            python: '3.12'
            python_arch: 'x64'
            tox_env: 'py312'
            os: 'ubuntu-latest'
            cover: true
          - name: 'py312 (windows/x64)'
            python: '3.12'
            python_arch: 'x64'
            tox_env: 'py312'
            os: 'windows-latest'
            cover: true
          - name: 'py312 (macos/arm64)'
            python: '3.12'
            python_arch: 'arm64'
            tox_env: 'py312'
            os: 'macos-latest'
            cover: true
          - name: 'py313 (ubuntu/x64)'
            python: '3.13'
            python_arch: 'x64'
            tox_env: 'py313'
            os: 'ubuntu-latest'
            cover: true
          - name: 'py313 (windows/x64)'
            python: '3.13'
            python_arch: 'x64'
            tox_env: 'py313'
            os: 'windows-latest'
            cover: true
          - name: 'py313 (macos/arm64)'
            python: '3.13'
            python_arch: 'arm64'
            tox_env: 'py313'
            os: 'macos-latest'
            cover: true
          - name: 'py314 (ubuntu/x64)'
            python: '3.14'
            python_arch: 'x64'
            tox_env: 'py314'
            os: 'ubuntu-latest'
            cover: true
          - name: 'py314 (windows/x64)'
            python: '3.14'
            python_arch: 'x64'
            tox_env: 'py314'
            os: 'windows-latest'
            cover: true
          - name: 'py314 (macos/arm64)'
            python: '3.14'
            python_arch: 'arm64'
            tox_env: 'py314'
            os: 'macos-latest'
            cover: true
          - name: 'pypy39 (ubuntu/x64)'
            python: 'pypy-3.9'
            python_arch: 'x64'
            tox_env: 'pypy39'
            os: 'ubuntu-latest'
            cover: true
          - name: 'pypy39 (windows/x64)'
            python: 'pypy-3.9'
            python_arch: 'x64'
            tox_env: 'pypy39'
            os: 'windows-latest'
            cover: true
          - name: 'pypy39 (macos/arm64)'
            python: 'pypy-3.9'
            python_arch: 'arm64'
            tox_env: 'pypy39'
            os: 'macos-latest'
            cover: true
          - name: 'pypy310 (ubuntu/x64)'
            python: 'pypy-3.10'
            python_arch: 'x64'
            tox_env: 'pypy310'
            os: 'ubuntu-latest'
            cover: true
          - name: 'pypy310 (windows/x64)'
            python: 'pypy-3.10'
            python_arch: 'x64'
            tox_env: 'pypy310'
            os: 'windows-latest'
            cover: true
          - name: 'pypy310 (macos/arm64)'
            python: 'pypy-3.10'
            python_arch: 'arm64'
            tox_env: 'pypy310'
            os: 'macos-latest'
            cover: true
          - name: 'pypy311 (ubuntu/x64)'
            python: 'pypy-3.11'
            python_arch: 'x64'
            tox_env: 'pypy311'
            os: 'ubuntu-latest'
            cover: true
          - name: 'pypy311 (windows/x64)'
            python: 'pypy-3.11'
            python_arch: 'x64'
            tox_env: 'pypy311'
            os: 'windows-latest'
            cover: true
          - name: 'pypy311 (macos/arm64)'
            python: 'pypy-3.11'
            python_arch: 'arm64'
            tox_env: 'pypy311'
            os: 'macos-latest'
            cover: true
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python }}
        architecture: ${{ matrix.python_arch }}
    - name: install dependencies
      run: |
        python -mpip install --progress-bar=off -r ci/requirements.txt
        virtualenv --version
        pip --version
        tox --version
        pip list --format=freeze
    - name: test
      run: >
        tox -e ${{ matrix.tox_env }} -v
    - uses: codecov/codecov-action@v5
      if: matrix.cover
      env:
        # codecov-action@v5 transitively pulls in actions/github-script which still
        # targets Node 20 internally. This silences the warning until codecov releases a fix.
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      with:
        flags: ${{ matrix.name }}
        token: ${{ secrets.CODECOV_TOKEN }}
        verbose: true

  integration:
    name: integration (real plip data 9kbz)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: test
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - name: install package
      run: |
        python -m pip install --progress-bar=off -U pip
        python -m pip install --progress-bar=off .
    - name: "generate PLIP report (use case 1: receptor A, ligand B)"
      run: |
        mkdir -p integration-data/raw/9kbz-a-b
        docker run --rm \
          -v "${GITHUB_WORKSPACE}/integration-data/raw/9kbz-a-b:/results" \
          -w /results \
          --user "$(id -u):$(id -g)" \
          pharmai/plip:latest -i 9kbz -t --chains "[['A'], ['B']]"
    - name: convert PLIP report to csv (use case 1)
      run: |
        mkdir -p integration-data/csv/9kbz-a-b
        REPORT_PATH="$(find integration-data/raw/9kbz-a-b -type f -name '*.txt' | head -n 1)"
        if [ -z "$REPORT_PATH" ]; then
          echo "No .txt PLIP report found in integration-data/raw/9kbz-a-b"
          find integration-data/raw/9kbz-a-b -maxdepth 3 -type f || true
          exit 1
        fi
        pliparser plip2csv --input "$REPORT_PATH" --output integration-data/csv/9kbz-a-b
    - name: verify csv output (use case 1)
      run: |
        CSV_COUNT="$(find integration-data/csv/9kbz-a-b -type f -name '*.csv' | wc -l | tr -d ' ')"
        echo "Generated CSV files: $CSV_COUNT"
        if [ "$CSV_COUNT" -eq 0 ]; then
          echo "No CSV files were generated"
          exit 1
        fi
    - name: "convert csv to cxc (use case 1: receptor A, ligand B)"
      run: |
        mkdir -p integration-data/cxc
        cat > integration-data/cxc/csv2cxc-config-a-b.json <<'JSON'
        {
          "pdb": "9kbz",
          "model_id": 1,
          "receptor_chain": "A",
          "ligand_chain": "B",
          "transparency": 65,
          "issmalmol": false,
          "receptor_color": "gray",
          "ligand_color": "green"
        }
        JSON

        pliparser csv2cxc \
          --input integration-data/csv/9kbz-a-b \
          --output integration-data/cxc/9kbz-a-b.cxc \
          --config integration-data/cxc/csv2cxc-config-a-b.json

    - name: "generate PLIP report (use case 2: nucleic-acid receptor)"
      run: |
        mkdir -p integration-data/raw/9kbz-cd-b
        docker run --rm \
          -v "${GITHUB_WORKSPACE}/integration-data/raw/9kbz-cd-b:/results" \
          -w /results \
          --user "$(id -u):$(id -g)" \
          pharmai/plip:latest -i 9kbz -t --dnareceptor --chains "[['C','D'], ['A','B']]"
    - name: convert PLIP report to csv (use case 2)
      run: |
        mkdir -p integration-data/csv/9kbz-cd-b
        REPORT_PATH="$(find integration-data/raw/9kbz-cd-b -type f -name '*.txt' | head -n 1)"
        if [ -z "$REPORT_PATH" ]; then
          echo "No .txt PLIP report found in integration-data/raw/9kbz-cd-b"
          find integration-data/raw/9kbz-cd-b -maxdepth 3 -type f || true
          exit 1
        fi
        pliparser plip2csv --input "$REPORT_PATH" --output integration-data/csv/9kbz-cd-b
    - name: verify csv output (use case 2)
      run: |
        CSV_COUNT="$(find integration-data/csv/9kbz-cd-b -type f -name '*.csv' | wc -l | tr -d ' ')"
        echo "Generated CSV files: $CSV_COUNT"
        if [ "$CSV_COUNT" -eq 0 ]; then
          echo "No CSV files were generated"
          exit 1
        fi
    - name: "convert csv to cxc (use case 2: RNA receptor chains C,D)"
      run: |
        cat > integration-data/cxc/csv2cxc-config-cd.json <<'JSON'
        {
          "pdb": "9kbz",
          "model_id": 1,
          "receptor_chain": "C,D",
          "ligand_chain": "B",
          "transparency": 65,
          "issmalmol": false,
          "receptor_color": "gray",
          "ligand_color": "green"
        }
        JSON

        pliparser csv2cxc \
          --input integration-data/csv/9kbz-cd-b \
          --output integration-data/cxc/9kbz-cd-b.cxc \
          --config integration-data/cxc/csv2cxc-config-cd.json
    - name: verify cxc outputs
      run: |
        for CXC_PATH in integration-data/cxc/9kbz-a-b.cxc integration-data/cxc/9kbz-cd-b.cxc; do
          if [ ! -s "$CXC_PATH" ]; then
            echo "CXC file was not generated or is empty: $CXC_PATH"
            exit 1
          fi
          grep -q "# ChimeraX Command File" "$CXC_PATH" || {
            echo "CXC output does not contain expected header: $CXC_PATH"
            exit 1
          }
        done
    - name: upload integration artifacts
      uses: actions/upload-artifact@v4
      with:
        name: integration-9kbz-data
        path: |
          integration-data/raw/9kbz-a-b
          integration-data/raw/9kbz-cd-b
          integration-data/csv
          integration-data/cxc
